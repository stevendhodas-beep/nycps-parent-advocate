<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- White background, light border -->
  <rect width="512" height="512" rx="112" ry="112" fill="white"/>
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="#D1D5DB" stroke-width="8"/>

  <!-- Line 1: N (green) · Y (orange) -->
  <text
    x="256"
    y="258"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-14"
  >
    <tspan fill="#4B9A2A">N</tspan><tspan fill="#F0821E">Y</tspan>
  </text>

  <!-- Line 2: C (blue) · P (navy) -->
  <text
    x="256"
    y="468"
    text-anchor="middle"
    font-family="'Nunito', system-ui, sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-14"
  >
    <tspan fill="#4E8CC4">C</tspan><tspan fill="#1B2D6C">P</tspan>
  </text>
</svg>
