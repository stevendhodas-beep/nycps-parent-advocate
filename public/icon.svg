<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: deep navy, rounded like an app icon -->
  <rect width="512" height="512" rx="112" ry="112" fill="#1e3a8a"/>

  <!-- Subtle inner glow to lift the letters -->
  <rect width="512" height="512" rx="112" ry="112"
        fill="url(#shine)" opacity="0.12"/>

  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Line 1: NY -->
  <text
    x="256"
    y="220"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="185"
    letter-spacing="-6"
    fill="#ffffff"
  >NY</text>

  <!-- Line 2: C (white) + P (amber) -->
  <text
    x="256"
    y="400"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="185"
    letter-spacing="-6"
  >
    <tspan fill="#ffffff">C</tspan><tspan fill="#fbbf24">P</tspan>
  </text>
</svg>
